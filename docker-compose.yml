version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    # If datasets are large, mount instead of COPY:
    # volumes:
    #   - ./data/datasets:/app/data/datasets:ro

  ed-dashboard:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    ports:
      - "8501:8501"
    environment:
      - DASHBOARD=ed
      - API_URL=http://api:8000
    depends_on:
      api:
        condition: service_healthy

  pcp-dashboard:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    ports:
      - "8502:8501"
    environment:
      - DASHBOARD=pcp
      - API_URL=http://api:8000
    depends_on:
      api:
        condition: service_healthy